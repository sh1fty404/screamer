<!DOCTYPE html>
<html>
<head>
    <title>читы бравл старс</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        h1 {
            font-size: 60px;
            margin-top: 120px;
            text-shadow: 0 0 20px red, 0 0 40px red;
        }
        .buttons {
            margin-top: 40px;
        }
        button {
            font-size: 28px;
            padding: 18px 40px;
            margin: 12px;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            font-weight: bold;
        }
        .btn1 {
            background: linear-gradient(#ff0000, #aa0000);
            color: white;
            box-shadow: 0 0 20px red;
        }
        .btn2 {
            background: black;
            color: white;
        }

        #img {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1000;
            animation: flicker 0.08s infinite alternate;
        }

        @keyframes flicker {
            0%   { opacity: 1; }
            10%  { opacity: 0.15; }
            20%  { opacity: 0.9; }
            35%  { opacity: 0.1; }
            50%  { opacity: 0.85; }
            65%  { opacity: 0.2; }
            80%  { opacity: 0.95; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <h1>ЧИТЫ В БРАВЛ СТАРС БЕСПЛАТНО!</h1>
    <div class="buttons">
        <button class="btn1" onclick="start()">Скачать</button>
        <button class="btn2" onclick="start()">Нет спасибо</button>
    </div>

    <audio id="sound" src="konik.mp3" preload="auto"></audio>
    <img id="img" src="konina.jpg">

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");

    // Полноэкранный режим, сука
    document.documentElement.requestFullscreen?.();

    img.style.display = "block";
    
    // Перезапускаем звук
    sound.currentTime = 0;
    sound.play().catch(() => {});

    // Через 3 секунды можно вырубить если хочешь, но пусть бесит
    setTimeout(() => {
        img.style.animation = "flicker 0.05s infinite alternate";
    }, 300);
}
</script>
</body>
</html>
