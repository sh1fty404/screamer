<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>

    <style>
        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: red;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body style="text-align:center; font-family:Arial;">

<h1 id="text">Тест на внимательность</h1>
<p>Нажми кнопку и смотри в центр экрана.</p>

<button onclick="start()">Начать</button>

<div id="flash"></div>

<audio id="sound" src="konik.mp3" preload="auto"></audio>

<img id="img" style="display:none; width:100vw; height:100vh; object-fit:cover;">

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");
    const flash = document.getElementById("flash");
    const text = document.getElementById("text");

    // fullscreen (ТОЛЬКО после клика — иначе не работает)
    document.documentElement.requestFullscreen?.();

    text.style.display = "none";

    setTimeout(() => {
        img.src = "konina.jpg";
        img.style.display = "block";

        sound.currentTime = 0;
        sound.play();

        // мигающий красный экран
        let on = false;
        let interval = setInterval(() => {
            flash.style.opacity = on ? "0.6" : "0";
            on = !on;
        }, 120);

        setTimeout(() => {
            clearInterval(interval);
            flash.style.opacity = "0";
        }, 2500);

    }, 4000);
}
</script>

</body>
</html>
