<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;

            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        h1 {
            font-size: 60px;
            margin-top: 120px;
            position: relative;
            z-index: 1;
        }

        .buttons {
            position: relative;
            z-index: 1;
            margin-top: 40px;
        }

        button {
            font-size: 25px;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
        }

        .btn1 {
            background: red;
            color: white;
        }

        .btn2 {
            background: black;
            color: white;
        }

        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: red;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        #img {
            display: none;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
    </style>
</head>

<body>

<h1>ЧИТЫ В БРАВЛ СТАРС БЕСПЛАТНО!</h1>

<div class="buttons">
    <button class="btn1" onclick="start()">Скачать</button>
    <button class="btn2" onclick="start()">Выйти</button>
</div>

<div id="flash"></div>

<audio id="sound" src="konik.mp3" preload="auto"></audio>

<img id="img">

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");
    const flash = document.getElementById("flash");

    document.documentElement.requestFullscreen?.();

    img.src = "konina.jpg";
    img.style.display = "block";

    sound.currentTime = 0;
    sound.play();

    let on = false;
    let interval = setInterval(() => {
        flash.style.opacity = on ? "0.35" : "0";
        on = !on;
    }, 180);

    setTimeout(() => {
        clearInterval(interval);
        flash.style.opacity = "0";
    }, 2000);
}
</script>

</body>
</html>
