<!DOCTYPE html>
<html>
<head>
    <title>читы бравл старс</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            text-align: center;
            color: white;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        h1 {
            font-size: 55px;
            margin-top: 100px;
            text-shadow: 0 0 30px red;
        }
        button {
            font-size: 28px;
            padding: 18px 45px;
            margin: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn1 { background: #ff0000; box-shadow: 0 0 25px red; }
        .btn2 { background: #111; }

        #img {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1000;
        }

        #flash {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            pointer-events: none;
        }

        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-18px, 10px); }
            20% { transform: translate(15px, -12px); }
            30% { transform: translate(-10px, 15px); }
            40% { transform: translate(18px, -10px); }
            50% { transform: translate(-15px, 12px); }
            60% { transform: translate(12px, -15px); }
            70% { transform: translate(-18px, 8px); }
            80% { transform: translate(15px, -10px); }
            90% { transform: translate(-10px, 10px); }
            100% { transform: translate(0, 0); }
        }

        .shaking {
            animation: shake 0.07s infinite linear;
        }
    </style>
</head>
<body>
    <h1>ЧИТЫ В БРАВЛ СТАРС БЕСПЛАТНО СУКА!!!</h1>
    <div>
        <button class="btn1" onclick="start()">СКАЧАТЬ НАХУЙ</button>
        <button class="btn2" onclick="start()">НЕ, Я ЛОХ</button>
    </div>

    <audio id="sound" src="sound.mp3" preload="auto"></audio>
    <img id="img" src="image.jpg">
    <div id="flash"></div>

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");
    const flash = document.getElementById("flash");

    document.documentElement.requestFullscreen?.();
    
    img.style.display = "block";
    flash.style.display = "block";

    sound.currentTime = 0;
    sound.play();

    let phase = 0;

    const strobe = setInterval(() => {
        phase++;

        if (phase % 4 === 0) {
            img.style.opacity = "1";
            flash.style.background = "transparent";
        } 
        else if (phase % 4 === 1) {
            img.style.opacity = "0.2";
            flash.style.background = "white";
        } 
        else if (phase % 4 === 2) {
            img.style.opacity = "1";
            flash.style.background = "transparent";
        } 
        else {
            img.style.opacity = "0.15";
            flash.style.background = "black";
        }
    }, 40);

    img.classList.add("shaking");

    setTimeout(() => {
        clearInterval(strobe);
        img.classList.remove("shaking");
        flash.style.background = "transparent";
        img.style.opacity = "1";
    }, 70000);
}
</script>
</body>
</html>
