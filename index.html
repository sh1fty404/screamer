<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;

            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        h1 {
            font-size: 60px;
            margin-top: 120px;
            position: relative;
            z-index: 1;
        }

        .buttons {
            position: relative;
            z-index: 1;
            margin-top: 40px;
        }

        button {
            font-size: 25px;
            padding: 15px 30px;
            margin: 10px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
        }

        .btn1 {
            background: red;
            color: white;
        }

        .btn2 {
            background: black;
            color: white;
        }

        #img {
            display: none;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* 🔥 мигание */
        @keyframes flicker {
            0% { opacity: 1; }
            10% { opacity: 0.2; }
            20% { opacity: 1; }
            30% { opacity: 0.3; }
            40% { opacity: 1; }
            50% { opacity: 0.1; }
            60% { opacity: 1; }
            70% { opacity: 0.4; }
            80% { opacity: 1; }
            90% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>

<h1>ЧИТЫ В БРАВЛ СТАРС БЕСПЛАТНО!</h1>

<div class="buttons">
    <button class="btn1" onclick="start()">Скачать</button>
    <button class="btn2" onclick="start()">Выйти</button>
</div>

<audio id="sound" src="konik.mp3" preload="auto"></audio>

<img id="img">

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");

    document.documentElement.requestFullscreen?.();

    img.src = "konina.jpg";
    img.style.display = "block";

    // запускаем мигание
    img.style.animation = "flicker 0.3s linear 6";

    sound.currentTime = 0;
    sound.play();
}
</script>

</body>
</html>
