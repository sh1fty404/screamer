<!DOCTYPE html>
<html>
<head>
    <title>Тест</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1 id="text">Тест на внимательность</h1>
<p>Нажми кнопку и смотри в центр экрана.</p>

<button onclick="start()">Начать</button>

<audio id="sound" src="konik.mp3" preload="auto"></audio>

<img id="img" style="display:none; width:100vw; height:100vh; object-fit:cover;">

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");
    const text = document.getElementById("text");

    sound.currentTime = 0;
    sound.play();

    text.style.display = "none";

    setTimeout(() => {
        img.src = "konina.jpg";
        img.style.display = "block";
    }, 5000);
}
</script>

</body>
</html>
