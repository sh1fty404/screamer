<!DOCTYPE html>
<html>
<head>
    <title>читы бравл старс</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            text-align: center;
            color: white;
            background: url("background.jpg") no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }
        h1 {
            font-size: 55px;
            margin-top: 100px;
            text-shadow: 0 0 30px red;
        }
        button {
            font-size: 28px;
            padding: 18px 45px;
            margin: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn1 { background: #ff0000; box-shadow: 0 0 25px red; }
        .btn2 { background: #111; }

        #img {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1000;
        }

        #flash {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>ЧИТЫ В БРАВЛ СТАРС БЕСПЛАТНО СУКА!</h1>
    <div>
        <button class="btn1" onclick="start()">СКАЧАТЬ НАХУЙ</button>
        <button class="btn2" onclick="start()">ВЫЙТИ ИЗ ИГРЫ</button>
    </div>

    <audio id="sound" src="konik.mp3" preload="auto"></audio>
    <img id="img" src="konina.jpg">
    <div id="flash"></div>

<script>
function start() {
    const sound = document.getElementById("sound");
    const img = document.getElementById("img");
    const flash = document.getElementById("flash");

    document.documentElement.requestFullscreen?.();
    
    img.style.display = "block";
    flash.style.display = "block";
    
    sound.currentTime = 0;
    sound.play().catch(() => {});

    let phase = 0;

    const strobe = setInterval(() => {
        phase++;

        if (phase % 4 === 0) {           // картинка
            img.style.opacity = "1";
            flash.style.background = "transparent";
        } 
        else if (phase % 4 === 1) {      // БЕЛЫЙ
            img.style.opacity = "0.3";
            flash.style.background = "white";
        } 
        else if (phase % 4 === 2) {      // картинка
            img.style.opacity = "1";
            flash.style.background = "transparent";
        } 
        else {                           // ЧЁРНЫЙ
            img.style.opacity = "0.2";
            flash.style.background = "black";
        }
    }, 70); // скорость мигания, чем меньше — тем быстрее

    // Авто-вырубка через 8 секунд чтобы не сдох совсем
    setTimeout(() => {
        clearInterval(strobe);
        flash.style.background = "transparent";
        img.style.opacity = "1";
    }, 8000);
}
</script>
</body>
</html>
